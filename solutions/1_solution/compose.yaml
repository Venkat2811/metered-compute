name: mc-solution1

services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    env_file:
      - .env.dev.defaults
    environment:
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-metered-compute}
      OTEL_EXPORT_TIMEOUT_SECONDS: ${OTEL_EXPORT_TIMEOUT_SECONDS:-3.0}
      OTEL_SAMPLER_RATIO: ${OTEL_SAMPLER_RATIO:-1.0}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      hydra:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    env_file:
      - .env.dev.defaults
    environment:
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-metered-compute}
      OTEL_EXPORT_TIMEOUT_SECONDS: ${OTEL_EXPORT_TIMEOUT_SECONDS:-3.0}
      OTEL_SAMPLER_RATIO: ${OTEL_SAMPLER_RATIO:-1.0}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "9100:9100"
    restart: unless-stopped

  reaper:
    build:
      context: .
      dockerfile: docker/reaper/Dockerfile
    env_file:
      - .env.dev.defaults
    environment:
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-metered-compute}
      OTEL_EXPORT_TIMEOUT_SECONDS: ${OTEL_EXPORT_TIMEOUT_SECONDS:-3.0}
      OTEL_SAMPLER_RATIO: ${OTEL_SAMPLER_RATIO:-1.0}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  webhook-dispatcher:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    command: ["python", "-m", "solution1.workers.webhook_dispatcher"]
    env_file:
      - .env.dev.defaults
    environment:
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-metered-compute}
      OTEL_EXPORT_TIMEOUT_SECONDS: ${OTEL_EXPORT_TIMEOUT_SECONDS:-3.0}
      OTEL_SAMPLER_RATIO: ${OTEL_SAMPLER_RATIO:-1.0}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "9300:9300"
    restart: unless-stopped

  hydra-migrate:
    image: oryd/hydra:v25.4.0
    env_file:
      - .env.dev.defaults
    command: ["migrate", "sql", "up", "-e", "--yes"]
    depends_on:
      postgres:
        condition: service_healthy

  hydra:
    image: oryd/hydra:v25.4.0
    env_file:
      - .env.dev.defaults
    command: ["serve", "all", "--dev"]
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "hydra", "list", "oauth2-clients", "-e", "http://localhost:4445", "--format", "json"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "4444:4444"
      - "4445:4445"
    restart: unless-stopped

  hydra-client-init:
    image: oryd/hydra:v25.4.0
    env_file:
      - .env.dev.defaults
    entrypoint: ["sh", "/bootstrap-clients.sh"]
    volumes:
      - ./docker/hydra/bootstrap-clients.sh:/bootstrap-clients.sh:ro
    depends_on:
      hydra:
        condition: service_healthy
    restart: "no"

  redis:
    image: redis:8.2.4-alpine3.22
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.5.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api
      - worker
      - reaper
      - webhook-dispatcher
      - hydra
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.3.3
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.9.0
    profiles: ["tracing"]
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
    ports:
      - "3200:3200"
      - "4317:4317"
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.132.0
    profiles: ["tracing"]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./monitoring/otel/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"
    depends_on:
      - tempo
    restart: unless-stopped

volumes:
  postgres_data:
