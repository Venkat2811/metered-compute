global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: worker
    static_configs:
      - targets: ["worker:9100"]
    metrics_path: /metrics

  - job_name: outbox-relay
    static_configs:
      - targets: ["outbox-relay:9200"]
    metrics_path: /metrics

  - job_name: projector
    static_configs:
      - targets: ["projector:9300"]
    metrics_path: /metrics

  - job_name: watchdog
    static_configs:
      - targets: ["watchdog:9400"]
    metrics_path: /metrics

  - job_name: webhook-worker
    static_configs:
      - targets: ["webhook-worker:9500"]
    metrics_path: /metrics
