unit_gate: worklog/baselines/gates.unit.yaml
integration_gate: worklog/baselines/gates.integration.yaml
require_fault_tests:
  - worker_crash_pel_recovery
  - redis_down_graceful_503
  - postgres_down_controlled_degradation
require_observability:
