name: mc-solution4

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bfl
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  tb-init:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.78
    entrypoint: ["sh", "-c"]
    command:
      - |
        if [ ! -f /data/0_0.tigerbeetle ]; then
          /tigerbeetle format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle
        else
          echo "TigerBeetle data file already exists; skipping format"
        fi
    volumes: ["tbdata:/data"]

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.78
    command: ["start", "--addresses=0.0.0.0:3000", "/data/0_0.tigerbeetle"]
    ports: ["3000:3000"]
    cap_add: [IPC_LOCK]
    volumes: ["tbdata:/data"]
    depends_on:
      tb-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "echo 'ok'"]
      interval: 5s
      timeout: 3s
      retries: 10

  restate:
    image: docker.restate.dev/restatedev/restate:1.6.2
    ports:
      - "8080:8080"   # ingress
      - "9070:9070"   # admin/UI
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9070/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports: ["8000:8000"]
    environment:
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/mc
      REDIS_URL: redis://redis:6379/0
      TIGERBEETLE_ADDRESSES: tigerbeetle:3000
      RESTATE_INGRESS_URL: http://restate:8080
      RESTATE_ADMIN_URL: http://restate:9070
      COMPUTE_WORKER_URL: http://compute:8001
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      tigerbeetle: { condition: service_healthy }
      restate: { condition: service_healthy }
      compute: { condition: service_healthy }

  compute:
    build: .
    command: ["python", "-m", "solution5.workers.compute_worker"]
    ports: ["8001:8001"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2)\""]
      interval: 3s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  pgdata:
  tbdata:
